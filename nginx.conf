server {
    listen 80;
    server_name 179.237.66.21;  # Remplacer par le domaine si disponible

    # Fichiers statiques du client Vite
    root /var/www/fleurieux/client/dist;
    index index.html;

    # Proxy API vers le backend Node
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité basique
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Pas d'accès au dossier server/
    location ~ ^/server/ {
        deny all;
    }
}
